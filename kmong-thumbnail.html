<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>크몽 썸네일 — ZeroPack</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; display:flex; flex-direction:column; align-items:center; gap:28px; padding:40px 20px; font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
  .guide { color:#555; font-size:13px; text-align:center; }
  .guide strong { color:#A78BFF; }

  /* ── 캔버스 652×488 ── */
  .canvas {
    width:652px; height:488px;
    background:linear-gradient(160deg,#0e0b1f 0%,#0a0a14 100%);
    border-radius:12px; overflow:hidden; position:relative; flex-shrink:0;
  }

  /* 배경 장식 */
  .bg-glow {
    position:absolute; width:500px; height:500px;
    background:radial-gradient(circle, rgba(108,71,255,.18) 0%, transparent 65%);
    top:-120px; left:50%; transform:translateX(-50%);
    pointer-events:none;
  }
  .bg-grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(108,71,255,.05) 1px, transparent 1px),
      linear-gradient(90deg,rgba(108,71,255,.05) 1px,transparent 1px);
    background-size:44px 44px;
  }

  /* 전체 캔버스 중앙 텍스트 영역 */
  .center-area {
    position:absolute; inset:0; z-index:2;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    text-align:center; padding:0 48px;
  }

  /* 상단 작은 배지 */
  .top-badge {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(108,71,255,.15); border:1px solid rgba(108,71,255,.35);
    border-radius:100px; padding:6px 16px;
    font-size:13px; font-weight:700; color:#A78BFF;
    margin-bottom:28px;
  }
  .top-badge .dot-anim {
    width:7px; height:7px; background:#22c55e;
    border-radius:50%; flex-shrink:0;
  }

  /* 메인 카피 */
  .main-copy {
    font-size:68px; font-weight:900; color:#fff;
    letter-spacing:-3px; line-height:1.1;
    margin-bottom:24px;
  }
  .main-copy em { color:#A78BFF; font-style:normal; }

  /* 서브 태그들 */
  .tags {
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
  }
  .tag {
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
    border-radius:100px; padding:5px 14px;
    font-size:13px; font-weight:600; color:#aaa;
  }

  /* 로고 */
  .logo {
    position:absolute; bottom:24px; right:28px; z-index:3;
    font-size:12px; font-weight:900; color:#444; letter-spacing:.5px;
  }
  .logo span { color:#6C47FF; }
</style>
</head>
<body>
<p class="guide">⬇ 아래 이미지를 <strong>652×488px</strong>로 스크린샷 — 이미지 영역만 정확히 캡처</p>

<!-- ── 썸네일 ── -->
<div class="canvas">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- 중앙 텍스트 -->
  <div class="center-area">
    <div class="top-badge">
      <div class="dot-anim"></div>
      코딩 몰라도 OK · 구독료 0원
    </div>
    <div class="main-copy">5분이면 내<br><em>홈페이지</em> 완성</div>
    <div class="tags">
      <span class="tag">✓ 코딩 불필요</span>
      <span class="tag">✓ 무료 호스팅</span>
      <span class="tag">✓ 평생 내 소유</span>
    </div>
  </div>

  <div class="logo">Zero<span>Pack</span></div>
</div>

<p class="guide" style="margin-top:8px;">Windows: <strong>Win+Shift+S</strong> → 이미지 영역 드래그 &nbsp;|&nbsp; Mac: <strong>Cmd+Shift+4</strong></p>
</body>
</html>
